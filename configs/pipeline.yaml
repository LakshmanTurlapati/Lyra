version: 1

defaults:
  min_response_chars: 10
  max_turn_ratio: 50
  min_assistant_messages: 1
  ngram_size: 3
  dedup_threshold: 0.7
  dedup_scope: "response"
  style_validation: true
  include_quality_scores: true
  output_suffix: "_curated"

domains:
  tool-calling:
    min_response_chars: 5
    max_turn_ratio: 100
    dedup_scope: "full"
    dedup_threshold: 0.9
    style:
      max_tokens: 800
      require_tool_calls: true
      allow_terse: true

  code:
    min_response_chars: 20
    dedup_scope: "user-response"
    dedup_threshold: 0.98
    style:
      max_tokens: 600
      require_code_blocks: true
      max_prose_ratio: 0.6

  knowledge:
    min_response_chars: 100
    dedup_scope: "user-response"
    dedup_threshold: 0.995
    style:
      min_tokens: 120
      require_reasoning_markers: true
      min_prose_ratio: 0.7

topic_distribution:
  tool-calling: 0.33
  code: 0.33
  knowledge: 0.34

template_paths:
  tool-calling: "templates/tool-calling.yaml"
  code: "templates/code.yaml"
  knowledge: "templates/knowledge.yaml"
